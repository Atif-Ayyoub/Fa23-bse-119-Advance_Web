<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Node MySQL Form</title>
</head>
<body>
  <h2>Save Data</h2>
    <div style="position:relative;">
      <button id="addBtn" title="Add new user" style="position:fixed;right:18px;bottom:18px;width:48px;height:48px;border-radius:50%;background:#007bff;color:#fff;border:none;font-size:28px;cursor:pointer;">+</button>
      <div id="formWrapper" style="display:none;position:fixed;right:18px;bottom:80px;width:360px;background:#fff;border:1px solid #ddd;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
        <div id="msg" style="color:green;margin-bottom:8px;display:none"></div>
        <form id="mysqlForm">
          <input type="text" name="firstName" id="firstName" placeholder="First Name" required style="width:100%"><br><br>
          <input type="text" name="lastName" id="lastName" placeholder="Last Name" required style="width:100%"><br><br>
          <input type="email" name="email" id="email" placeholder="Email Address" required style="width:100%"><br><br>
          <input type="text" name="phone" id="phone" placeholder="Phone Number" style="width:100%"><br><br>
          <input type="date" name="dob" id="dob" style="width:100%"><br><br>
          <select name="gender" id="gender" style="width:100%">
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
          <br><br>
          <input type="text" name="address" id="address" placeholder="Address" style="width:100%"><br><br>
          <input type="text" name="username" id="username" placeholder="Username" style="width:100%"><br><br>
          <input type="password" name="password" id="password" placeholder="Password" style="width:100%"><br><br>
          <div style="text-align:right"><button type="submit">Save</button></div>
        </form>
      </div>
    </div>

    <h3>Users</h3>
    <div id="usersContainer" class="cards"></div>

    <style>
      .cards { display:flex; flex-wrap:wrap; gap:12px; }
      .card { border:1px solid #ccc; padding:0; box-sizing:border-box; width:calc(25% - 12px); background:#fff; display:flex; flex-direction:column; }
      .card-header { background:#f5f5f5; padding:8px 12px; font-weight:600; text-align: center; }
      .card-body { padding:12px; flex:1; }
      .card-footer { padding:8px 12px; border-top:1px solid #eee; display:flex; justify-content:space-evenly; gap:8px; }
      .card-footer button { margin:0; }
      @media (max-width:900px){ .card{width:calc(50% - 12px);} }
      @media (max-width:480px){ .card{width:100%;} }
    </style>

    <script>
      const apiBase = '/users';
      const addBtn = document.getElementById('addBtn');
      const formWrapper = document.getElementById('formWrapper');
      const msg = document.getElementById('msg');

      addBtn.addEventListener('click', () => {
        formWrapper.style.display = formWrapper.style.display === 'none' ? 'block' : 'none';
        msg.style.display = 'none';
      });

      async function loadUsers() {
        const res = await fetch(apiBase);
        const users = await res.json();
        const container = document.getElementById('usersContainer');
        container.innerHTML = '';
        users.forEach(u => {
          const id = u.id;
          const div = document.createElement('div');
          div.className = 'card';
          div.innerHTML = `
            <div class="card-header">${(u.first_name || '') + ' ' + (u.last_name || '')}</div>
            <div class="card-body">
              <div>${u.email || ''}</div>
              <div>${u.phone ? 'Phone: '+u.phone : ''}</div>
              <div>${u.dob ? 'DOB: '+(new Date(u.dob)).toLocaleDateString() : ''}</div>
              <div>${u.gender ? 'Gender: '+u.gender : ''}</div>
              <div>${u.address || ''}</div>
              <div>${u.username ? 'Username: '+u.username : ''}</div>
            </div>
            <div class="card-footer"></div>
          `;
          const footer = div.querySelector('.card-footer');
          const view = document.createElement('button'); view.textContent = 'View';
          view.onclick = () => alert(JSON.stringify(u, null, 2));
          const edit = document.createElement('button'); edit.textContent = 'Edit';
          edit.onclick = async () => {
            const firstName = prompt('First Name', u.first_name || '') || '';
            const lastName = prompt('Last Name', u.last_name || '') || '';
            const email = prompt('Email', u.email || '') || '';
            const phone = prompt('Phone', u.phone || '') || '';
            const dob = prompt('DOB (YYYY-MM-DD)', u.dob || '') || '';
            const gender = prompt('Gender', u.gender || '') || '';
            const address = prompt('Address', u.address || '') || '';
            const username = prompt('Username', u.username || '') || '';
            const password = prompt('Password (leave blank to keep)', '') || '';
            const body = { firstName, lastName, email, phone, dob, gender, address, username };
            if (password) body.password = password;
            const resp = await fetch(`${apiBase}/${id}`, { method: 'PUT', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(body) });
            if (resp.ok) loadUsers(); else alert('Update failed');
          };
          const del = document.createElement('button'); del.textContent = 'Delete';
          del.onclick = async () => {
            if (!confirm('Delete this user?')) return;
            const resp = await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
            if (resp.ok) loadUsers(); else alert('Delete failed');
          };
          footer.appendChild(view); footer.appendChild(edit); footer.appendChild(del);
          container.appendChild(div);
        });
      }

      document.getElementById('mysqlForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          dob: document.getElementById('dob').value,
          gender: document.getElementById('gender').value,
          address: document.getElementById('address').value,
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        };
        const res = await fetch('/submit', { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(body) });
        if (res.ok) {
          document.getElementById('mysqlForm').reset();
          msg.textContent = 'Data Inserted Successfully ✅';
          msg.style.display = 'block';
          setTimeout(() => { msg.style.display = 'none'; formWrapper.style.display = 'none'; }, 2500);
          loadUsers();
        } else {
          alert('Insert failed');
        }
      });

      loadUsers();
    </script>
</body>
</html>
